    <style>
      :root {
        --font-sans: 'Space Grotesk', 'Segoe UI', sans-serif;
        --font-display: 'Fraunces', 'Georgia', serif;
        --study-ink: #0f172a;
        --study-void: #0b0f12;
        --study-mint: #2dd4bf;
        --study-accent: #f59e0b;
        --study-signal: #22c55e;
      }
      body { font-family: var(--font-sans); background-color: #f8fafc; }
      /* Custom scrollbar for better UX */
      ::-webkit-scrollbar { width: 8px; }
      ::-webkit-scrollbar-track { background: #f1f1f1; }
      ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
      ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
      
      .animate-marquee {
        animation: marquee 25s linear infinite;
      }
      @keyframes marquee {
        0% { transform: translateX(0%); }
        100% { transform: translateX(-50%); }
      }

      @keyframes studyRise {
        0% { opacity: 0; transform: translateY(12px); }
        100% { opacity: 1; transform: translateY(0); }
      }
      .study-rise { animation: studyRise 0.6s ease-out both; }
      .study-delay-1 { animation-delay: 0.08s; }
      .study-delay-2 { animation-delay: 0.16s; }
      .study-delay-3 { animation-delay: 0.24s; }
    </style>
  <script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@^19.2.3",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",

    "lucide-react": "https://esm.sh/lucide-react@^0.562.0",

  }
}
</script>
</head>
  <body>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          // Register service worker for Offline Mode (PWA)
          // Pointing to a root file in a real deployment
          navigator.serviceWorker.register('/service-worker.js')
            .then(reg => console.log('SW registered'))
            .catch(err => console.log('SW registration failed: ', err));
        });
      }
    </script>
  </body>
